topic_prefix: pi/io
mqtt_server_ip: localhost
mqtt_server_port: 1883
mqtt_server_user: mqtt
mqtt_server_password: 123abc

switches:
  - id: office_lights
    name: Office
    output_id: O_1_1
    md-icon: ceiling-light
    # Optional: bind this switch to a z2m group. group_topic is the canonical
    # base; group_command_topic, group_json_state_topic, and group_state_topic
    # derive from it (`<group_topic>/set`, `<group_topic>`,
    # `<group_topic>/state` respectively) if not set explicitly. mqttio defers
    # state publishing to z2m when the group's `<group_topic>/availability`
    # reports online; otherwise it publishes itself (UPPERCASE payloads,
    # matching z2m's casing). group_command_topic alone is also accepted for
    # backwards compat.
    # group_topic: zigbee2mqtt/office/lights